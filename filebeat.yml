filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/5g-app/*.json
    fields:
      app_service: 5g-handover-ai
    fields_under_root: true
    from_beginning: true
    # Parse each line as JSON
    json.keys_under_root: true
    json.overwrite_keys: true
    json.add_error_key: true

output.elasticsearch:
  hosts: ["es-5g:9200"]
  protocol: "http"
  ssl.enabled: false

setup.kibana:
  host: "kibana-5g:5601"

# Disable ILM to avoid mapping conflicts
setup.ilm.enabled: false

logging.level: debug