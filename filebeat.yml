filebeat.inputs:
  # ── Prediction events (NDJSON — one doc per line) ──────────────────────────
  - type: log
    enabled: true
    paths:
      - /var/log/5g-app/predictions.json
      - /var/log/5g-app/mlops_history.jsonl
    fields:
      app_service: 5g-handover-ai
      log_type: prediction
    fields_under_root: true
    from_beginning: true
    json.keys_under_root: true
    json.overwrite_keys: true
    json.add_error_key: true

output.elasticsearch:
  hosts: ["es-5g:9200"]
  protocol: "http"
  ssl.enabled: false
  indices:
    - index: "predictions-5g-%{+yyyy.MM.dd}"
      when.equals:
        log_type: "prediction"

setup.kibana:
  host: "kibana-5g:5601"

setup.ilm.enabled: false

logging.level: info
