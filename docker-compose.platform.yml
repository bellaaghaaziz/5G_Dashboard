services:
  postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform123}
      POSTGRES_DB: ${POSTGRES_DB:-platform_users}
    ports:
      - "5433:5432"
    volumes:
      - platform_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform_users}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: platform-redis
    ports:
      - "6379:6379"

  user-service:
    build:
      context: .
      dockerfile: docker/platform/user-service.Dockerfile
    container_name: platform-user-service
    environment:
      USER_SERVICE_PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform123}
      POSTGRES_DB: ${POSTGRES_DB:-platform_users}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@5g.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Platform Admin}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  prediction-service:
    build:
      context: .
      dockerfile: docker/platform/prediction-service.Dockerfile
    container_name: platform-prediction-service
    environment:
      PREDICTION_SERVICE_PORT: 3002
      PYTHON_INFERENCE_BASE_URL: ${PYTHON_INFERENCE_BASE_URL:-http://host.docker.internal:8000}
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  dashboard-service:
    build:
      context: .
      dockerfile: docker/platform/dashboard-service.Dockerfile
    container_name: platform-dashboard-service
    environment:
      DASHBOARD_SERVICE_PORT: 3003
      PREDICTIONS_LOG_PATH: /app/shared-logs/predictions.json
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: 5g-telemetry
      KAFKA_GROUP_ID: dashboard-group
      CELL_GPS_PATH: /app/shared-logs/cell_gps.json
      INFERENCE_URL: http://host.docker.internal:8000
      AI_ENABLED: "true"
    volumes:
      - ./logs:/app/shared-logs:ro
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: docker/platform/api-gateway.Dockerfile
    container_name: platform-api-gateway
    environment:
      API_GATEWAY_PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      PREDICTION_SERVICE_URL: http://prediction-service:3002
      DASHBOARD_SERVICE_URL: http://dashboard-service:3003
      ML_SERVICE_URL: http://host.docker.internal:8000
      PROMETHEUS_URL: http://prometheus:9090
      GRAFANA_URL: http://grafana:3000
      MLFLOW_URL: http://mlflow:5000
      K8S_DASHBOARD_URL: http://host.docker.internal:8001
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      LLM_API_KEY: sk-ea7d2d1704574e36b3c606de752fb653
      LLM_BASE_URL: https://tokenfactory.esprit.tn/api
      LLM_MODEL: hosted_vllm/Llama-3.1-70B-Instruct
    ports:
      - "3000:3000"
    depends_on:
      user-service:
        condition: service_healthy
      prediction-service:
        condition: service_healthy
      dashboard-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  replayer:
    profiles: ["legacy"]   # disabled — use kafka-producer instead
    build:
      context: .
      dockerfile: docker/platform/replayer.Dockerfile
    container_name: platform-replayer
    environment:
      DATASET_PATH: /app/DATASET/df_master_engineered.parquet
      CELL_GPS_PATH: /app/shared-logs/cell_gps.json
      MAP_STATE_PATH: /app/shared-logs/dataset_map_state.json
      HO_HISTORY_PATH: /app/shared-logs/dataset_handover_history.json
      REPLAY_SPEED: "30"
    volumes:
      - ./DATASET:/app/DATASET:ro
      - ./logs:/app/shared-logs
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/platform/web.Dockerfile
    container_name: platform-web
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_WS_URL: http://localhost:3003
    ports:
      - "5173:5173"
    depends_on:
      api-gateway:
        condition: service_healthy

  # ── Monitoring & Observability Stack ──

  prometheus:
    image: prom/prometheus:latest
    container_name: platform-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: platform-grafana
    ports:
      - "3004:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    container_name: platform-mlflow
    working_dir: /mlflow
    command: >
      sh -c "mkdir -p /mlruns/.trash && pip install mlflow -q && mlflow server --backend-store-uri sqlite:////mlflow.db --default-artifact-root file:///mlruns --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow.db:/mlflow.db
    restart: unless-stopped

  # ── FastAPI Inference Server ──────────────────────────────────────────────

  inference:
    image: 5g_dashboard-api:latest
    container_name: platform-inference
    entrypoint: ["/bin/bash", "-c"]
    command: ["pip install prometheus-client -q && uvicorn api:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - ELASTICSEARCH_HOST=http://host.docker.internal:9200
      - PYTHONPATH=/app
    volumes:
      - ./api.py:/app/api.py:ro
      - ./logs:/app/logs
      - ./mlruns:/app/mlruns
      - ./model_manifest.json:/app/model_manifest.json:ro
      - ./metrics.json:/app/metrics.json:ro
      - ./mlops:/app/mlops:ro
      - ./src:/app/src:ro
      - ./DATASET:/app/DATASET:ro
      - ./model_feature_lists.json:/app/model_feature_lists.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      - mlflow

  # ── Kafka Data Ingestion Stack ─────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: platform-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: platform-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --list --bootstrap-server localhost:9092 2>/dev/null && echo ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-consumer:
    build:
      context: .
      dockerfile: docker/platform/kafka_consumer.Dockerfile
    container_name: platform-kafka-consumer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:29092
      - KAFKA_TOPIC=5g-telemetry
      - DATA_PATH=/app/DATASET/raw/live_data.csv
    volumes:
      - ./DATASET:/app/DATASET
    restart: unless-stopped

  kafka-producer:
    build:
      context: .
      dockerfile: docker/platform/kafka_producer.Dockerfile
    container_name: platform-kafka-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:29092
      - KAFKA_TOPIC=5g-telemetry
      - DATASET_PATH=/app/DATASET/df_master_engineered.parquet
      - CELL_GPS_PATH=/app/shared-logs/cell_gps.json
    volumes:
      - ./DATASET:/app/DATASET:ro
      - ./logs:/app/shared-logs:ro
    restart: unless-stopped

volumes:
  platform_pg_data:
  prometheus_data:
  grafana_data:
