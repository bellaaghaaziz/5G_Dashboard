apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cellpilot-inference-hpa
  namespace: cellpilot-mlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cellpilot-inference
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
