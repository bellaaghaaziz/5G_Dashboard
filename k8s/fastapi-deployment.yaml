apiVersion: apps/v1
kind: Deployment
metadata:
  name: 5g-api-service
  namespace: 5g-mlops
  labels:
    app: api-inference
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-inference
  template:
    metadata:
      labels:
        app: api-inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: inference-fastapi
          image: 5g_dashboard-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://5g-mlflow:5000"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: 5g-api-service
  namespace: 5g-mlops
spec:
  selector:
    app: api-inference
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP