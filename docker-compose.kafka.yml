services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: platform-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - 5g-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: platform-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - 5g-network

  kafka-consumer:
    build:
      context: .
      dockerfile: docker/platform/kafka_consumer.Dockerfile
    container_name: 5g-kafka-consumer
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=kafka:29092
      - KAFKA_TOPIC=5g-telemetry
      - DATA_PATH=/app/DATASET/raw/live_data.csv
    volumes:
      - ./DATASET:/app/DATASET
    networks:
      - 5g-network

networks:
  5g-network:
    driver: bridge